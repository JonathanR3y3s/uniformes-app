<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0c0c0c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Control Store Pro">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="description" content="Control Store Pro — Sistema de gestión de almacén y uniformes ASSA ABLOY">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230f172a'/%3E%3Ctext x='50' y='68' font-family='Arial Black,sans-serif' font-size='50' font-weight='900' text-anchor='middle' fill='%232563eb'%3EAA%3C/text%3E%3C/svg%3E">
  <title>Control Store Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>body{padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}</style>
</head>
<body>
  <div id="app">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo"><i class="fas fa-boxes"></i></div>
        <div class="sidebar-brand"><div class="sidebar-title">Control Store Pro</div><div class="sidebar-sub">ASSA ABLOY México</div></div>
      </div>
      <nav class="sidebar-nav" id="sidebarNav"></nav>
      <div class="sidebar-footer" id="sidebarFooter"></div>
    </aside>
    <main class="main" id="main">
      <header class="topbar" id="topbar">
        <button class="topbar-hamburger" id="hamburger"><i class="fas fa-bars"></i></button>
        <div class="topbar-title" id="topbarTitle">Dashboard</div>
        <div id="topbarActions" style="display:flex;gap:8px;align-items:center"></div>
        <div class="topbar-right">
          <span class="topbar-user" id="topbarUser"></span>
          <button class="btn btn-ghost btn-sm" id="logoutBtn"><i class="fas fa-sign-out-alt"></i><span class="sidebar-label">Salir</span></button>
          <span class="topbar-badge">v6.4</span>
        </div>
      </header>
      <div id="mainContent" class="page"></div>
    </main>
  </div>
  <div id="modalOverlay" class="modal-overlay">
    <div class="modal-box md" id="modalBox">
      <div class="modal-head"><h2 id="modalTitle"></h2><button class="btn-icon btn-ghost" id="modalClose"><i class="fas fa-times"></i></button></div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-foot" id="modalFoot"></div>
    </div>
  </div>
  <div id="notifWrap" class="notif-wrap"></div>
  <script>
  (function(){function gen(s){var c=document.createElement('canvas');c.width=s;c.height=s;var x=c.getContext('2d');var r=s*.16;x.fillStyle='#0f172a';x.beginPath();x.moveTo(r,0);x.lineTo(s-r,0);x.quadraticCurveTo(s,0,s,r);x.lineTo(s,s-r);x.quadraticCurveTo(s,s,s-r,s);x.lineTo(r,s);x.quadraticCurveTo(0,s,0,s-r);x.lineTo(0,r);x.quadraticCurveTo(0,0,r,0);x.closePath();x.fill();x.fillStyle='#2563eb';x.font='900 '+Math.round(s*.5)+'px "Arial Black",Arial,sans-serif';x.textAlign='center';x.textBaseline='middle';x.fillText('AA',s/2,s/2+s*.04);return c;}function tb(c){return new Promise(function(r){c.toBlob(r,'image/png');});}tb(gen(180)).then(function(b){var l=document.createElement('link');l.rel='apple-touch-icon';l.href=URL.createObjectURL(b);document.head.appendChild(l);});tb(gen(32)).then(function(b){var l=document.createElement('link');l.rel='icon';l.type='image/png';l.href=URL.createObjectURL(b);document.head.appendChild(l);});if('serviceWorker'in navigator){navigator.serviceWorker.register('./sw.js').then(function(r){console.log('[PWA] Service Worker registrado');var sz=[72,96,128,144,152,192,384,512];Promise.all(sz.map(function(s){return tb(gen(s)).then(function(b){return{url:'icons/icon-'+s+'.png',blob:b};});})).then(function(ic){if(r.active)r.active.postMessage({type:'CACHE_ICONS',icons:ic});console.log('[PWA] Íconos listos');});}).catch(function(e){console.warn('[PWA] Error:',e);});}})();
  </script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
