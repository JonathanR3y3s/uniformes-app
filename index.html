  <style>
    body{padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);overscroll-behavior-y:contain}
    /* Loading state */
    #mainContent:empty::before{content:'';display:block;height:400px;background:linear-gradient(90deg,#f1f5f9 25%,#f8fafc 50%,#f1f5f9 75%);background-size:200% 100%;animation:loading 1.5s infinite;border-radius:8px}
    @keyframes loading{0%{background-position:200% 0}100%{background-position:-200% 0}}
    /* Focus states for better accessibility */
    .btn:focus,.nav-item:focus,input:focus,select:focus{outline:2px solid var(--accent);outline-offset:2px}
    /* Better page transitions */
    .page{animation:pageIn .25s ease-out}
    @keyframes pageIn{from{opacity:0}to{opacity:1}}
    /* Improved hover states */
    .card:active{box-shadow:var(--shadow);transform:translateY(0)}
  </style>

<body>
  <div id="app">

        <div class="topbar-right"><span class="topbar-badge" id="topbarBadge">v5.0</span></div>
      </header>
      <div id="mainContent" class="page"></div>
    </main>
  </div>
  <div id="modalOverlay" class="modal-overlay">

      <div class="modal-head"><h2 id="modalTitle"></h2><button class="btn-icon btn-ghost" id="modalClose"><i class="fas fa-times"></i></button></div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-foot" id="modalFoot"></div>
    </div>
  </div>
  <div id="notifWrap" class="notif-wrap"></div>
  <script>
  (function(){function gen(s){var c=document.createElement('canvas');c.width=s;c.height=s;var x=c.getContext('2d');var r=s*.16;x.fillStyle='#0f172a';x.beginPath();x.moveTo(r,0);x.lineTo(s-r,0);x.quadraticCurveTo(s,0,s,r);x.lineTo(s,s-r);x.quadraticCurveTo(s,s,s-r,s);x.lineTo(r,s);x.quadraticCurveTo(0,s,0,s-r);x.lineTo(0,r);x.quadraticCurveTo(0,0,r,0);x.closePath();x.fill();x.fillStyle='#2563eb';x.font='900 '+Math.round(s*.5)+'px "Arial Black",Arial,sans-serif';x.textAlign='center';x.textBaseline='middle';x.fillText('AA',s/2,s/2+s*.04);return c;}function tb(c){return new Promise(function(r){c.toBlob(r,'image/png');});}tb(gen(180)).then(function(b){var l=document.createElement('link');l.rel='apple-touch-icon';l.href=URL.createObjectURL(b);document.head.appendChild(l);});tb(gen(32)).then(function(b){var l=document.createElement('link');l.rel='icon';l.type='image/png';l.href=URL.createObjectURL(b);document.head.appendChild(l);});if('serviceWorker'in navigator){navigator.serviceWorker.register('./sw.js').then(function(r){console.log('[PWA] Service Worker registrado');var sz=[72,96,128,144,152,192,384,512];Promise.all(sz.map(function(s){return tb(gen(s)).then(function(b){return{url:'icons/icon-'+s+'.png',blob:b};});})).then(function(ic){if(r.active)r.active.postMessage({type:'CACHE_ICONS',icons:ic});console.log('[PWA] Íconos listos');});}).catch(function(e){console.warn('[PWA] Error:',e);});}})();
  </script>
  <script type="module" src="js/app.js"></script>
